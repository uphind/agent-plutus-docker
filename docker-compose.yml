services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy-entrypoint.sh:/entrypoint.sh
      - caddy_data:/data
      - caddy_config:/config
      - ./certs:/certs:ro
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
    entrypoint: /entrypoint.sh
    depends_on:
      - app

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Database (connects to the db service below)
      DATABASE_URL: "postgresql://plutus:${POSTGRES_PASSWORD:-plutus_secret}@db:5432/agent_plutus?schema=public"

      # Secrets -- CHANGE THESE in your .env file
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-change-me-to-a-32-char-secret!!}"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-auth-secret-32-chars!!}"

      # Public URL -- set DOMAIN in .env to your subdomain
      AUTH_URL: "https://${DOMAIN:-localhost}"
      AUTH_TRUST_HOST: "true"

      # SSO -- configure in .env (see README for setup instructions)
      SSO_PROVIDER: "${SSO_PROVIDER:-oidc}"
      SSO_ISSUER: "${SSO_ISSUER:-}"
      SSO_CLIENT_ID: "${SSO_CLIENT_ID:-}"
      SSO_CLIENT_SECRET: "${SSO_CLIENT_SECRET:-}"
      SSO_SAML_ENTRY_POINT: "${SSO_SAML_ENTRY_POINT:-}"
      SSO_SAML_ISSUER: "${SSO_SAML_ISSUER:-}"
      SSO_SAML_CERT: "${SSO_SAML_CERT:-}"

      # SSO domain restriction (comma-separated, e.g. "payoneer.com,company.com")
      SSO_ALLOWED_DOMAINS: "${SSO_ALLOWED_DOMAINS:-}"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plutus
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-plutus_secret}"
      POSTGRES_DB: agent_plutus
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  caddy_data:
  caddy_config:
